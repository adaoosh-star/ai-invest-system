# 监控设置
monitoring:
  enabled: true
  check_frequency: "5min"  # 交易时间 5 分钟检查一次
  alert_level: "orange"   # 橙色及以上推送钉钉
  auto_report: true       # 自动生成盘后报告

# 总仓位控制
position_control:
  total_max: 500000       # 总仓位上限 50 万
  single_max_ratio: 0.30  # 单一持仓不超过 30%
  industry_max_ratio: 0.40 # 单一行业不超过 40%
